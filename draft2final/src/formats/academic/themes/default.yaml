layout:
  fontFamily: Caladea
  fontSize: 10.8
  lineHeight: 1.5
  pageSize: LETTER
  margins:
    top: 72
    right: 72
    bottom: 72
    left: 72
  hyphenation: auto
  justifyEngine: advanced
  justifyStrategy: auto

footer:
  default:
    elements:
      - type: paragraph
        content: "{pageNumber}"
        properties:
          style:
            textAlign: center
            fontSize: 9
            color: "#4f4f4f"
            fontFamily: Caladea
            marginTop: 31

styles:
  # ── Body text ──────────────────────────────────────────────────────────────
  paragraph:
    textAlign: left
    marginBottom: 8

  # ── Headings ───────────────────────────────────────────────────────────────
  # H1 = document title only; no top margin needed (sits at page top).
  heading-1:
    fontSize: 20
    lineHeight: 1.15
    fontWeight: 700
    hyphenation: "off"
    textAlign: left
    marginTop: 0
    marginBottom: 18

  # H2 = numbered section headings (Abstract, 1. Background, …).
  # 14pt bold is the accepted weight for single-column academic papers
  # at 10–11pt body size (IEEE, APA, Chicago A-level heading).
  heading-2:
    fontSize: 14
    lineHeight: 1.25
    fontWeight: 700
    hyphenation: "off"
    textAlign: left
    marginTop: 18
    marginBottom: 8

  # H3 = subsection headings — bold italic per Chicago/APA convention.
  heading-3:
    fontSize: 12
    lineHeight: 1.3
    fontWeight: 700
    fontStyle: italic
    hyphenation: "off"
    textAlign: left
    marginTop: 10
    marginBottom: 5

  # ── Structural elements ────────────────────────────────────────────────────
  thematic-break:
    borderTopWidth: 0.6
    borderTopColor: "#4a4a4a"
    marginTop: 6
    marginBottom: 14

  citation-marker:
    fontSize: 8.2
    color: "#1a1a1a"

  code-block:
    fontFamily: Cousine
    fontSize: 9.6
    lineHeight: 1.28
    backgroundColor: "#ffffff"
    borderWidth: 0
    borderColor: "#9a9a9a"
    borderRadius: 0
    paddingTop: 5
    paddingBottom: 5
    paddingLeft: 7
    paddingRight: 7
    marginTop: 0
    marginBottom: 8
  inline-code:
    fontFamily: Cousine
    fontSize: 9.6
    backgroundColor: "#ffffff"
  blockquote:
    textAlign: left
    fontStyle: normal
    fontSize: 10.6
    lineHeight: 1.45
    color: "#202020"
    paddingLeft: 18
    paddingRight: 18
    borderLeftWidth: 0
    marginTop: 0
    marginBottom: 9
  blockquote-attribution:
    textAlign: right
    fontStyle: italic
    fontSize: 10.2
    color: "#3f3f3f"
    marginTop: 2
    marginBottom: 7
  references-heading:
    hyphenation: "off"
    textAlign: left
    fontSize: 14
    fontWeight: 700
    lineHeight: 1.25
    marginTop: 18
    marginBottom: 8
  references-item:
    textAlign: left
    hyphenation: "off"
    fontSize: 10.4
    lineHeight: 1.42
    paddingLeft: 14
    textIndent: -14
    marginBottom: 4
  definition-term:
    fontWeight: 700
    keepWithNext: true
    marginTop: 0
    marginBottom: 1.5
  definition-desc:
    paddingLeft: 14
    marginTop: 0
    marginBottom: 7
  table-cell:
    paddingTop: 4
    paddingBottom: 4
    paddingLeft: 5
    paddingRight: 5
    borderWidth: 0.6
    borderColor: "#111111"
