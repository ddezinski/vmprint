layout:
  fontFamily: Caladea
  fontSize: 11.8
  lineHeight: 1.5
  pageSize:
    width: 432
    height: 648
  margins:
    top: 72
    right: 64
    bottom: 68
    left: 64
  hyphenation: auto
  justifyEngine: advanced
  justifyStrategy: auto

footer:
  default:
    elements:
      - type: paragraph
        content: "\u2014 {pageNumber} \u2014"
        properties:
          style:
            textAlign: center
            fontSize: 9
            color: "#8a7d6e"
            fontFamily: Caladea
            marginTop: 31

styles:
  heading-1:
    fontSize: 22
    lineHeight: 1.25
    textAlign: center
    fontStyle: italic
    hyphenation: "off"
    marginTop: 54
    marginBottom: 34
    letterSpacing: 0.4
    keepWithNext: true
  heading-2:
    fontSize: 10.4
    lineHeight: 1.3
    textAlign: center
    fontWeight: 400
    hyphenation: "off"
    letterSpacing: 2.4
    marginTop: 22
    marginBottom: 18
    keepWithNext: true
  heading-3:
    fontSize: 11.8
    fontStyle: italic
    textAlign: left
    hyphenation: "off"
    marginTop: 12
    marginBottom: 6
    keepWithNext: true
  paragraph:
    textAlign: justify
    hyphenation: auto
    lineHeight: 1.5
    textIndent: 18
    marginBottom: 0
  inline-code:
    fontFamily: Caladea
    fontStyle: italic
    color: "#2a2218"
    backgroundColor: "#ffffff"
  code-block:
    fontFamily: Cousine
    fontSize: 9.6
    lineHeight: 1.42
    color: "#2a2218"
    backgroundColor: "#f8f5ef"
    borderWidth: 0
    borderRadius: 0
    paddingTop: 10
    paddingBottom: 10
    paddingLeft: 14
    paddingRight: 14
    marginTop: 10
    marginBottom: 10
  blockquote:
    textAlign: left
    hyphenation: "off"
    fontStyle: italic
    fontSize: 11
    lineHeight: 1.52
    color: "#2e2618"
    paddingLeft: 30
    paddingRight: 30
    borderLeftWidth: 0
    marginTop: 12
    marginBottom: 12
  blockquote-attribution:
    textAlign: right
    fontStyle: normal
    fontSize: 9.4
    color: "#7a6e5e"
    marginTop: 3
    marginBottom: 10
  thematic-break:
    width: 48
    marginLeft: 128
    borderTopWidth: 0.5
    borderTopColor: "#c0b09a"
    marginTop: 18
    marginBottom: 18
  citation-marker:
    fontSize: 8
    color: "#6a5e4e"
  footnote-marker:
    fontSize: 8
    baselineShift: 3
  footnotes-heading:
    fontSize: 10.4
    hyphenation: "off"
    marginTop: 12
    marginBottom: 6
  footnotes-item:
    textAlign: left
    hyphenation: "off"
    fontSize: 9.4
    lineHeight: 1.4
    paddingLeft: 12
    textIndent: -12
    marginBottom: 3.6
  references-heading:
    fontSize: 10.4
    hyphenation: "off"
    marginTop: 10
    marginBottom: 6
  references-item:
    textAlign: left
    hyphenation: "off"
    fontSize: 9.4
    lineHeight: 1.4
    paddingLeft: 12
    textIndent: -12
    marginBottom: 3.6
  definition-term:
    fontStyle: italic
    fontWeight: 700
    color: "#2a2218"
    keepWithNext: true
    marginTop: 0
    marginBottom: 1.4
  definition-desc:
    paddingLeft: 16
    marginBottom: 7
  table-cell:
    paddingTop: 5
    paddingBottom: 5
    paddingLeft: 6
    paddingRight: 6
    borderWidth: 0.45
    borderColor: "#b0a08a"
