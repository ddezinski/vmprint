manuscript:
  coverPage:
    mode: first-page-cover
  runningHeader:
    enabled: true
    format: "{surname} / {shortTitle} / {n}"
  chapter:
    pageBreakBefore: true
  sceneBreak:
    symbol: "#"
  footnotes:
    mode: endnotes
    heading: Notes
    markerStyle: superscript

links:
  mode: strip

typography:
  smartQuotes: true
